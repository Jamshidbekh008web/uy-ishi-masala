<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Muamalat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <div class="container">

    <div class="ask-diyor">
      <div class="ask-text">
        <small>Questions?</small>
        <span>Ask Diyor</span>
      </div>
      <img src="./image/svg/tyson.svg" alt="Diyor" />
    </div>


    <div class="left">
      <div class="logo">
        <img src="./image/svg/Logo.svg" alt="" />
      </div>

      <h1>Get started</h1>

      <div class="input-group">
        <div class="input-wrap">
          <input type="email" placeholder="Enter your email" />
          <span class="icon"><i class="fa-solid fa-envelope"></i></span>
        </div>
      </div>

      <div class="input-group">
        <div class="input-wrap">
          <input type="password" placeholder="Password" />
        </div>
      </div>

      <button class="btn-signin">Sign in</button>

      <p class="create-link">
        <a href="./main.html">Create a new account !</a>
      </p>
    </div>


    <div class="right">
      <div class="right-illu">
        <img src="./image/png/opani-rasmi.png" alt="" />
      </div>
      <div class="right-text">
        <h2>Welcome to Al Muamalat –<br />Empowering Your Journey in<br />Islamic Finance</h2>
      </div>
    </div>

  </div>
</body>

</html>
