<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Muamalat – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
</head>

<body>

  <div class="container">

  
    <div class="ask-diyor">
      <div class="ask-text">
        <small>Questions?</small>
        <span>Ask Diyor</span>
      </div>
      <img src="./image/svg/tyson.svg" alt="Diyor" />
    </div>

   
    <div class="left">
      <div class="logo">
        <img src="./image/svg/Logo.svg" alt="Al Muamalat Logo" />
      </div>

      <h1>Get started</h1>

      <div class="already-account">
        <span>Already have an account?</span>
        <a href="index.html">Sign in</a>
      </div>

     
      <div class="input-group">
        <div class="input-wrap">
          <input type="text" placeholder="Enter your name" />
          <span class="icon"><i class="fa-regular fa-user"></i></span>
        </div>
      </div>

      
      <div class="input-group">
        <div class="input-wrap">
          <input type="email" placeholder="Enter your email" />
          <span class="icon"><i class="fa-regular fa-envelope"></i></span>
        </div>
      </div>

      
      <div class="input-group">
        <div class="input-wrap select-wrap">
          <span class="flag"><img src="./image/svg/uz.svg" alt=""></span>
          <select id="country" onchange="updateFlag(this)">
            <option value="uz" data-flag="🇺🇿">Uzbekistan</option>
            <
     
          </select>
          <span class="select-arrow"><i class="fa-solid fa-chevron-down"></i></span>
        </div>
      </div>

      <button class="btn-login">Log in</button>

    </div>

    
    <div class="right">
      <div class="right-illu">
        <img src="./image/png/opani-rasmi.png" alt="Illustration" />
      </div>
      <div class="right-text">
        <h2>Welcome to Al Muamalat –<br />Empowering Your Journey in<br />Islamic Finance</h2>
      </div>
    </div>

  </div>


</body>
</html>
